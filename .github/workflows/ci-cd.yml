name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build frontend image
        run: docker build -t meghnabm/frontend:${{ github.sha }} ./frontend

      - name: Build backend image
        run: docker build -t meghnabm/backend:${{ github.sha }} ./backend

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Push frontend image
        run: docker push meghnabm/frontend:${{ github.sha }}

      - name: Push backend image
        run: docker push meghnabm/backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ci-cd-assignment
            docker-compose down
            docker-compose pull
            docker-compose up -d

      - name: Verify backend health
        run: curl -f http://13.200.85.141/health
